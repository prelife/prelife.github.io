<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Screener</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --accent-color: #f0b90b;
            --positive-color: #0ecb81;
            --negative-color: #f6465d;
            --card-bg: #ffffff;
            --hover-bg: #f0f0f0;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --border-color: #3a3a3a;
            --accent-color: #f0b90b;
            --positive-color: #0ecb81;
            --negative-color: #f6465d;
            --card-bg: #2a2a2a;
            --hover-bg: #3a3a3a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--text-primary);
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle:hover {
            background: var(--hover-bg);
        }

        .refresh-btn {
            background: var(--accent-color);
            border: none;
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .config-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .config-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .config-toggle-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .config-toggle-btn:hover {
            background: var(--hover-bg);
        }

        .config-content {
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .config-content.hidden {
            max-height: 0;
            opacity: 0;
        }

        .config-content.visible {
            max-height: 500px;
            opacity: 1;
        }

        .blacklist-textarea {
            grid-column: 1 / -1;
        }

        .blacklist-textarea textarea {
            width: 100%;
            min-height: 100px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: monospace;
            resize: vertical;
        }

        .blacklist-textarea textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .blacklist-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .config-item label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .config-item input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
        }

        .config-item input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .status-bar {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-dot.active {
            background: var(--positive-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        thead {
            background: var(--bg-secondary);
        }

        th {
            padding: 15px 12px;
            text-align: left;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background: var(--hover-bg);
        }

        .symbol-cell {
            font-weight: 600;
            color: var(--text-primary);
        }

        .positive {
            color: var(--positive-color);
        }

        .negative {
            color: var(--negative-color);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(246, 70, 93, 0.1);
            border: 1px solid var(--negative-color);
            color: var(--negative-color);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.4rem;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
                justify-content: space-between;
            }

            .theme-toggle,
            .refresh-btn {
                padding: 8px 16px;
                font-size: 0.9rem;
            }

            .config-grid {
                grid-template-columns: 1fr;
            }

            .status-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            table {
                font-size: 0.8rem;
            }

            th, td {
                padding: 10px 8px;
            }

            .table-container {
                border-radius: 8px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.2rem;
            }

            .header-controls {
                flex-direction: column;
                width: 100%;
            }

            .theme-toggle,
            .refresh-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Dark mode icon */
        .theme-icon {
            font-size: 1.2rem;
        }

        /* Auto-refresh toggle */
        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 13px;
            transition: all 0.3s;
        }

        .toggle-switch.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: var(--bg-primary);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle-switch.active::after {
            left: 27px;
        }

        .last-update {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Futures Analyzer</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle">
                    <span class="theme-icon">🌙</span>
                    <span>Dark Mode</span>
                </button>
                <label class="auto-refresh-toggle">
                    <span>Auto Refresh</span>
                    <div class="toggle-switch active" id="autoRefreshToggle"></div>
                </label>
                <button class="refresh-btn" id="refreshBtn">
                    🔄 Refresh
                </button>
            </div>
        </header>

        <div class="config-panel">
            <div class="config-header">
                <span class="config-title">⚙️ Configuration</span>
                <button class="config-toggle-btn" id="configToggleBtn">
                    <span>▼</span>
                    <span>Hide</span>
                </button>
            </div>
            <div class="config-content visible" id="configContent">
                <div class="config-grid">
                    <div class="config-item">
                        <label for="minVolume">Min Volume (USDT)</label>
                        <input type="number" id="minVolume" value="80000000">
                    </div>
                    <div class="config-item">
                        <label for="minTrades">Min Trades (24h)</label>
                        <input type="number" id="minTrades" value="600000">
                    </div>
                    <div class="config-item">
                        <label for="topN">Top N Coins</label>
                        <input type="number" id="topN" value="500">
                    </div>
                    <div class="config-item">
                        <label for="updateInterval">Update Interval (min)</label>
                        <input type="number" id="updateInterval" value="5">
                    </div>
                    <div class="config-item blacklist-textarea">
                        <label for="blacklistTextarea">Blacklist (one symbol per line)</label>
                        <textarea id="blacklistTextarea" placeholder="ETHUSDT&#10;BNBUSDT&#10;XRPUSDT">ETHUSDT
BNBUSDT
1000PEPEUSDT
XRPUSDT
SOLUSDT
ADAUSDT
DOGEUSDT
PAXGUSDT
XAGUSDT
XAUUSDT
FARTCOINUSDT
SUIUSDT
ETHFIUSDT</textarea>
                        <div class="blacklist-hint">Enter symbols to exclude from analysis (one per line, e.g., ETHUSDT, BNBUSDT)</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot active" id="statusDot"></div>
                <span id="statusText">Ready</span>
            </div>
            <div class="status-item">
                <span class="last-update" id="lastUpdate">Last update: Never</span>
            </div>
            <div class="status-item">
                <span id="coinCount">0 coins found</span>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Change %</th>
                        <th>Volume 24h</th>
                        <th>Volume %</th>
                        <th>Trades 24h</th>
                        <th>Corr 24h</th>
                        <th>Corr 1h</th>
                        <th>NATR 2h</th>
                        <th>Volatil 6h</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr>
                        <td colspan="9" class="no-data">
                            Click "Refresh" to load data
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            API_DELAY: 100,
            MAX_RETRIES: 3
        };

        // State
        let state = {
            isDarkMode: true,
            autoRefresh: true,
            refreshInterval: null,
            isLoading: false,
            configVisible: false
        };

        // DOM Elements
        const elements = {
            themeToggle: document.getElementById('themeToggle'),
            themeIcon: document.querySelector('.theme-icon'),
            themeText: document.querySelector('.theme-toggle span:last-child'),
            refreshBtn: document.getElementById('refreshBtn'),
            autoRefreshToggle: document.getElementById('autoRefreshToggle'),
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            lastUpdate: document.getElementById('lastUpdate'),
            coinCount: document.getElementById('coinCount'),
            resultsBody: document.getElementById('resultsBody'),
            minVolume: document.getElementById('minVolume'),
            minTrades: document.getElementById('minTrades'),
            topN: document.getElementById('topN'),
            updateInterval: document.getElementById('updateInterval'),
            blacklistTextarea: document.getElementById('blacklistTextarea'),
            configToggleBtn: document.getElementById('configToggleBtn'),
            configContent: document.getElementById('configContent')
        };

        // Get blacklist from textarea
        function getBlacklist() {
            const text = elements.blacklistTextarea.value.trim();
            if (!text) return [];
            return text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
        }

        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                setDarkMode(true);
            } else if (savedTheme === null) {
                setDarkMode(true);
            }
        }

        function setDarkMode(isDark) {
            state.isDarkMode = isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            if (isDark) {
                elements.themeIcon.textContent = '☀️';
                elements.themeText.textContent = 'Light Mode';
            } else {
                elements.themeIcon.textContent = '🌙';
                elements.themeText.textContent = 'Dark Mode';
            }
        }

        // Auto Refresh Management
        function initAutoRefresh() {
            const saved = localStorage.getItem('autoRefresh');
            if (saved !== null) {
                state.autoRefresh = saved === 'true';
                updateAutoRefreshUI();
            }
            startAutoRefresh();
        }

        function toggleAutoRefresh() {
            state.autoRefresh = !state.autoRefresh;
            localStorage.setItem('autoRefresh', state.autoRefresh);
            updateAutoRefreshUI();
            
            if (state.autoRefresh) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function updateAutoRefreshUI() {
            if (state.autoRefresh) {
                elements.autoRefreshToggle.classList.add('active');
            } else {
                elements.autoRefreshToggle.classList.remove('active');
            }
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            const interval = parseInt(elements.updateInterval.value) || 5;
            state.refreshInterval = setInterval(() => {
                if (!state.isLoading) {
                    fetchData();
                }
            }, interval * 60 * 1000);
        }

        function stopAutoRefresh() {
            if (state.refreshInterval) {
                clearInterval(state.refreshInterval);
                state.refreshInterval = null;
            }
        }

        // Utility Functions
        function formatNumber(num) {
            if (num === null || num === undefined || isNaN(num)) return '0.00M';
            
            // Format ALL values in Millions with two decimals (e.g., 0.45M, 1.23M)
            return (num / 1_000_000).toFixed(2) + 'M';
        }

        function formatChange(pct) {
            const sign = pct >= 0 ? '+' : '';
            return `${sign}${pct.toFixed(2)}%`;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // API Functions
        async function fetchWithRetry(url, retries = CONFIG.MAX_RETRIES) {
            for (let attempt = 0; attempt < retries; attempt++) {
                try {
                    const response = await fetch(url, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0'
                        }
                    });
                    
                    if (response.status === 429) {
                        const waitTime = Math.pow(2, attempt + 2) * 1000;
                        console.log(`Rate limit hit. Waiting ${waitTime}ms...`);
                        await sleep(waitTime);
                        continue;
                    }
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    return await response.json();
                } catch (error) {
                    if (attempt === retries - 1) {
                        throw error;
                    }
                    await sleep(Math.pow(2, attempt) * 1000);
                }
            }
            return null;
        }

        async function getKlines(symbol, interval, limit) {
            const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
            return await fetchWithRetry(url);
        }

        // Calculation Functions
        function mean(data) {
            return data.length > 0 ? data.reduce((a, b) => a + b, 0) / data.length : 0;
        }

        function stdDev(data, sample = true) {
            if (data.length < 2) return 0;
            const m = mean(data);
            // Use sample std dev (n-1 denominator) if sample=true, else population (n)
            const variance = data.reduce((sum, x) => sum + Math.pow(x - m, 2), 0) / (sample ? data.length - 1 : data.length);
            return Math.sqrt(variance);
        }

        function correlation(x, y) {
            const n = Math.min(x.length, y.length);
            if (n < 2) return 0;
            
            const meanX = mean(x.slice(0, n));
            const meanY = mean(y.slice(0, n));
            const stdX = stdDev(x.slice(0, n));
            const stdY = stdDev(y.slice(0, n));
            
            if (stdX === 0 || stdY === 0) {
                return (stdX === 0 && stdY === 0 && meanX === meanY) ? 1.0 : 0;
            }
            
            let covariance = 0;
            for (let i = 0; i < n; i++) {
                covariance += (x[i] - meanX) * (y[i] - meanY);
            }
            covariance /= n;
            
            const corr = covariance / (stdX * stdY);
            return Math.max(-1.0, Math.min(1.0, corr));
        }

        function calculateATR(highs, lows, closes, period = 14) {
            const tr = [];
            for (let i = 1; i < closes.length; i++) {
                const h = highs[i];
                const l = lows[i];
                const cPrev = closes[i - 1];
                tr.push(Math.max(h - l, Math.abs(h - cPrev), Math.abs(l - cPrev)));
            }
            
            if (tr.length === 0) return 0;
            const usePeriod = Math.min(period, tr.length);
            return mean(tr.slice(-usePeriod));
        }

        function calculateReturns(closes) {
            if (closes.length < 2) return [];
            const returns = [];
            for (let i = 1; i < closes.length; i++) {
                // Use log returns: ln(P_t / P_{t-1})
                returns.push(Math.log(closes[i] / closes[i - 1]));
            }
            return returns;
        }

        function calculateVolatility(returns, annualize = false, periodsPerYear = 8760) {
            const n = returns.length;
            if (n < 5) return 0;  // Minimum sample size for statistical significance
            
            // Calculate sample standard deviation
            const m = mean(returns);
            const variance = returns.reduce((sum, x) => sum + Math.pow(x - m, 2), 0) / (n - 1);
            let vol = Math.sqrt(variance);
            
            // Annualize if requested: σ_annual = σ_period * sqrt(periods_per_year)
            if (annualize) {
                vol = vol * Math.sqrt(periodsPerYear);
            }
            
            // Multiply by 100 to express as percentage
            return vol * 100;
        }

        function calculateRealizedVolatility(highs, lows, closes, period = 14) {
            const n = Math.min(period, highs.length, lows.length);
            if (n < 5) {
                // Fallback to close-to-close volatility if insufficient OHLC data
                if (closes.length >= 5) {
                    const returns = calculateReturns(closes.slice(-n));
                    return calculateVolatility(returns);
                }
                return 0;
            }
            
            // Calculate squared log ranges
            const squaredLogRanges = [];
            for (let i = 1; i < n; i++) {
                const h = highs[i];
                const l = lows[i];
                if (h > 0 && l > 0) {
                    const logRange = Math.log(h / l);
                    squaredLogRanges.push(logRange ** 2);
                }
            }
            
            if (squaredLogRanges.length === 0) {
                // Fallback to close-to-close volatility
                if (closes.length >= 5) {
                    const returns = calculateReturns(closes.slice(-squaredLogRanges.length - 1));
                    return calculateVolatility(returns);
                }
                return 0;
            }
            
            // Parkinson's formula: variance = sum of squared log ranges / (4 * ln(2) * N)
            const k = 4 * Math.log(2);
            const variance = squaredLogRanges.reduce((a, b) => a + b, 0) / (k * squaredLogRanges.length);
            const volatility = Math.sqrt(variance);
            
            return volatility * 100;
        }

        function parseKlines(klines) {
            if (!klines || klines.length === 0) {
                return { opens: [], highs: [], lows: [], closes: [] };
            }
            
            const opens = [], highs = [], lows = [], closes = [];
            for (const k of klines) {
                opens.push(parseFloat(k[1]));
                highs.push(parseFloat(k[2]));
                lows.push(parseFloat(k[3]));
                closes.push(parseFloat(k[4]));
            }
            return { opens, highs, lows, closes };
        }

        function calculateVolumePercentage(symbolVolume, btcVolume) {
            if (btcVolume <= 0) return 0;
            return (symbolVolume / btcVolume) * 100;
        }

        // Main Analysis Function
        async function calculateMetrics(symbol, tickerData, btcCloses24h, btcCloses2h, btcCloses1hNear, btcVolume24h) {
            const symbolVolume = parseFloat(tickerData.quoteVolume || 0);
            const metrics = {
                symbol: symbol,
                volume_24h: symbolVolume,
                trades_24h: parseInt(tickerData.count || 0),
                price_change_pct_24h: parseFloat(tickerData.priceChangePercent || 0),
                btc_correlation_24h: 0,
                btc_correlation_1h_near: 0,
                natr_2h: 0,
                volatility_6h: 0,
                volume_pct_of_btc: calculateVolumePercentage(symbolVolume, btcVolume24h)
            };

            // BTC Correlation 24h (30m candles, 48 periods for better statistical significance)
            try {
                if (symbol === "BTCUSDT") {
                    metrics.btc_correlation_24h = 100.0;
                    metrics.btc_correlation_1h_near = 100.0;
                } else {
                    // Use 30m candles for 48 periods (24 hours) - more data points for better accuracy
                    const klines = await getKlines(symbol, '30m', 50);
                    if (klines && klines.length >= 48) {
                        const { closes } = parseKlines(klines);
                        const symReturns = calculateReturns(closes);
                        const btcReturns = calculateReturns(btcCloses24h);
                        
                        const minLen = Math.min(symReturns.length, btcReturns.length);
                        // Require at least 30 data points for statistically significant correlation
                        if (minLen >= 30) {
                            const corr = correlation(
                                symReturns.slice(-minLen),
                                btcReturns.slice(-minLen)
                            );
                            metrics.btc_correlation_24h = corr * 100;
                        }
                    }

                    // BTC Correlation 1h Near (5m candles, 12 periods for ~1h)
                    const klines5m = await getKlines(symbol, '5m', 15);
                    if (klines5m && klines5m.length >= 12) {
                        const { closes: symCloses5m } = parseKlines(klines5m);
                        const symReturns5m = calculateReturns(symCloses5m);
                        const btcReturns5m = calculateReturns(btcCloses1hNear);
                        
                        const minLen5m = Math.min(symReturns5m.length, btcReturns5m.length);
                        // Require at least 10 data points for meaningful short-term correlation
                        if (minLen5m >= 10) {
                            const corr5m = correlation(
                                symReturns5m.slice(-minLen5m),
                                btcReturns5m.slice(-minLen5m)
                            );
                            metrics.btc_correlation_1h_near = corr5m * 100;
                        }
                    }
                }
            } catch (e) {
                console.log(`Error calculating correlation for ${symbol}:`, e);
            }

            await sleep(CONFIG.API_DELAY);

            // NATR 2h (30m candles, 4 periods for 2h)
            try {
                const klines = await getKlines(symbol, '30m', 20);
                if (klines && klines.length >= 4) {
                    const { highs, lows, closes } = parseKlines(klines);
                    const atr = calculateATR(highs, lows, closes, 4);
                    const lastClose = closes[closes.length - 1] || 0;
                    metrics.natr_2h = lastClose ? (atr / lastClose) * 100 : 0;
                }
            } catch (e) {
                console.log(`Error calculating NATR for ${symbol}:`, e);
            }

            await sleep(CONFIG.API_DELAY);

            // Volatility 6h (1h candles, 7 periods for better statistical significance)
            try {
                const klines = await getKlines(symbol, '1h', 8);
                if (klines && klines.length >= 7) {
                    const { highs, lows, closes } = parseKlines(klines);
                    // Use Parkinson's realized volatility which is more efficient (uses OHLC data)
                    metrics.volatility_6h = calculateRealizedVolatility(highs, lows, closes, 7);
                }
            } catch (e) {
                console.log(`Error calculating volatility for ${symbol}:`, e);
            }

            return metrics;
        }

        // Update Status UI
        function updateStatus(status, isActive = false) {
            elements.statusText.textContent = status;
            if (isActive) {
                elements.statusDot.classList.add('active');
            } else {
                elements.statusDot.classList.remove('active');
            }
        }

        function updateLastUpdate() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            elements.lastUpdate.textContent = `Last update: ${timeStr}`;
        }

        // Render Results
        function renderResults(results) {
            if (!results || results.length === 0) {
                elements.resultsBody.innerHTML = `
                    <tr>
                        <td colspan="7" class="no-data">
                            No symbols matched the filtering criteria
                        </td>
                    </tr>
                `;
                elements.coinCount.textContent = '0 coins found';
                return;
            }

            elements.coinCount.textContent = `${results.length} coins found`;

            const html = results.map(row => {
                const changeClass = row.price_change_pct_24h >= 0 ? 'positive' : 'negative';
                const changeText = formatChange(row.price_change_pct_24h);
                
                return `
                    <tr>
                        <td class="symbol-cell" style="cursor: pointer;" title="Click to copy ${row.symbol}">${row.symbol}</td>
                        <td class="${changeClass}">${changeText}</td>
                        <td>${formatNumber(row.volume_24h)}</td>
                        <td>${row.volume_pct_of_btc.toFixed(2)}%</td>
                        <td>${formatNumber(row.trades_24h)}</td>
                        <td>${row.btc_correlation_24h.toFixed(2)}%</td>
                        <td>${row.btc_correlation_1h_near.toFixed(2)}%</td>
                        <td>${row.natr_2h.toFixed(2)}%</td>
                        <td>${row.volatility_6h.toFixed(2)}%</td>
                    </tr>
                `;
            }).join('');

            elements.resultsBody.innerHTML = html;
        }

        // Main Data Fetching Function
        async function fetchData() {
            if (state.isLoading) return;
            
            state.isLoading = true;
            elements.refreshBtn.disabled = true;
            updateStatus('Fetching data...', true);

            try {
                // Get config values
                const minVolume = parseInt(elements.minVolume.value) || 80000000;
                const minTrades = parseInt(elements.minTrades.value) || 600000;
                const topN = parseInt(elements.topN.value) || 500;

                // Fetch exchange info
                updateStatus('Fetching exchange info...', true);
                const infoData = await fetchWithRetry('https://fapi.binance.com/fapi/v1/exchangeInfo');
                if (!infoData) {
                    throw new Error('Failed to fetch exchange info');
                }

                // Fetch 24h ticker data
                updateStatus('Fetching ticker data...', true);
                const tickerData = await fetchWithRetry('https://fapi.binance.com/fapi/v1/ticker/24hr');
                if (!tickerData) {
                    throw new Error('Failed to fetch ticker data');
                }

                // Create lookup maps
                const symbolsInfo = {};
                infoData.symbols.forEach(s => {
                    symbolsInfo[s.symbol] = s;
                });

                const symbolsTicker = {};
                tickerData.forEach(s => {
                    symbolsTicker[s.symbol] = s;
                });

                // Fetch BTC reference data
                updateStatus('Fetching BTC reference data...', true);
                // 24h correlation: Use 30m candles for 48+ periods (need 50 to be safe)
                const btcKlines24h = await getKlines('BTCUSDT', '30m', 50);
                const btcCloses24h = parseKlines(btcKlines24h).closes;

                const btcKlines2h = await getKlines('BTCUSDT', '30m', 5);
                const btcCloses2h = parseKlines(btcKlines2h).closes;

                // 1h near correlation: Use 5m candles for 12+ periods (need 15 to be safe)
                const btcKlines1hNear = await getKlines('BTCUSDT', '5m', 15);
                const btcCloses1hNear = parseKlines(btcKlines1hNear).closes;

                // Get BTC 24h volume for volume percentage calculation
                const btcTicker = symbolsTicker['BTCUSDT'] || {};
                const btcVolume24h = parseFloat(btcTicker.quoteVolume || 0);

                // Filter and process symbols
                updateStatus('Processing symbols...', true);
                const filteredResults = [];
                let processed = 0;

                for (const [symbol, ticker] of Object.entries(symbolsTicker)) {
                    if (!symbol.endsWith('USDT')) continue;
                    
                    const blacklist = getBlacklist();
                    if (blacklist.includes(symbol)) continue;
                    
                    const info = symbolsInfo[symbol];
                    if (!info || info.status !== 'TRADING') continue;

                    const vol = parseFloat(ticker.quoteVolume || 0);
                    const trades = parseInt(ticker.count || 0);

                    if (vol < minVolume || trades < minTrades) continue;

                    await sleep(CONFIG.API_DELAY);

                    try {
                        const metrics = await calculateMetrics(symbol, ticker, btcCloses24h, btcCloses2h, btcCloses1hNear, btcVolume24h);
                        filteredResults.push(metrics);
                        processed++;
                        
                        if (processed % 50 === 0) {
                            updateStatus(`Processed ${processed} symbols...`, true);
                        }
                    } catch (e) {
                        console.log(`Error processing ${symbol}:`, e);
                    }
                }

                // Sort by price change percentage (descending)
                filteredResults.sort((a, b) => 
                    (b.price_change_pct_24h || 0) - (a.price_change_pct_24h || 0)
                );

                const finalResults = filteredResults.slice(0, topN);

                // Update UI
                renderResults(finalResults);
                updateLastUpdate();
                updateStatus('Ready', true);

            } catch (error) {
                console.error('Error fetching data:', error);
                elements.resultsBody.innerHTML = `
                    <tr>
                        <td colspan="9">
                            <div class="error-message">
                                Error: ${error.message}<br>
                                Please try again later or check your internet connection.
                            </div>
                        </td>
                    </tr>
                `;
                updateStatus('Error', false);
            } finally {
                state.isLoading = false;
                elements.refreshBtn.disabled = false;
            }
        }

        // Event Listeners
        elements.themeToggle.addEventListener('click', () => {
            setDarkMode(!state.isDarkMode);
        });

        elements.refreshBtn.addEventListener('click', fetchData);

        elements.autoRefreshToggle.addEventListener('click', toggleAutoRefresh);

        elements.updateInterval.addEventListener('change', () => {
            if (state.autoRefresh) {
                startAutoRefresh();
            }
        });

        elements.configToggleBtn.addEventListener('click', () => {
            state.configVisible = !state.configVisible;
            if (state.configVisible) {
                elements.configContent.classList.remove('hidden');
                elements.configContent.classList.add('visible');
                elements.configToggleBtn.querySelector('span:first-child').textContent = '▼';
                elements.configToggleBtn.querySelector('span:last-child').textContent = 'Hide';
            } else {
                elements.configContent.classList.remove('visible');
                elements.configContent.classList.add('hidden');
                elements.configToggleBtn.querySelector('span:first-child').textContent = '▲';
                elements.configToggleBtn.querySelector('span:last-child').textContent = 'Show';
            }
            localStorage.setItem('configVisible', state.configVisible);
        });

        // Click to copy symbol
        elements.resultsBody.addEventListener('click', (e) => {
            const symbolCell = e.target.closest('.symbol-cell');
            if (symbolCell) {
                const symbol = symbolCell.textContent.trim();
                navigator.clipboard.writeText(symbol).then(() => {
                    // Visual feedback
                    const originalBg = symbolCell.style.backgroundColor;
                    const originalText = symbolCell.textContent;
                    symbolCell.style.backgroundColor = 'var(--accent-color)';
                    symbolCell.textContent = '✓ Copied!';
                    setTimeout(() => {
                        symbolCell.style.backgroundColor = originalBg;
                        symbolCell.textContent = originalText;
                    }, 800);
                }).catch(err => {
                    console.error('Failed to copy:', err);
                });
            }
        });

        // Initialize
        initTheme();
        initAutoRefresh();
        
        // Init config visibility - hidden by default
        const savedConfigVisible = localStorage.getItem('configVisible');
        if (savedConfigVisible !== null) {
            state.configVisible = savedConfigVisible === 'true';
        } else {
            state.configVisible = false;
        }
        
        if (!state.configVisible) {
            elements.configContent.classList.remove('visible');
            elements.configContent.classList.add('hidden');
            elements.configToggleBtn.querySelector('span:first-child').textContent = '▲';
            elements.configToggleBtn.querySelector('span:last-child').textContent = 'Show';
        }

        // Auto-fetch on load
        fetchData();
    </script>
</body>
</html>
